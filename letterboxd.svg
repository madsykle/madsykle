<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="pc"><rect width="134" height="200"/></clipPath>
</defs>

<!-- bg -->
<rect width="800" height="200" fill="#0b0c15"/>

<!-- poster -->
<rect x="0" y="0" width="134" height="200" fill="#0a0b14"/>
       <text x="67" y="107" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#151722">▭</text>

<!-- right panel -->
<rect x="134" y="0" width="666" height="200" fill="#0b0c15"/>

<!-- separator -->
<line x1="134" y1="0" x2="134" y2="200" stroke="#1c1e2e" stroke-width="1"/>

<!-- label -->
<text x="154" y="33" font-family="'Courier New',monospace" font-size="8"
  fill="#374151" letter-spacing="3">RECENTLY WATCHED</text>

<!-- film title -->
<text x="152" y="88" font-family="Georgia,'Times New Roman',serif" font-size="26"
  font-weight="bold" fill="#e8ecf4">All About Lily Chou-Chou</text>

<!-- year -->
<text x="154" y="112" font-family="'Courier New',monospace" font-size="11" fill="#374151">2001</text>

<!-- rating -->
<text x="154" y="146" font-family="Georgia,serif" font-size="17"
  fill="#d97706" letter-spacing="2">★★★★★</text>

<!-- film-strip holes -->
<g fill="#070810">
  <rect x="4" y="14" width="7" height="10" rx="1.5"/><rect x="4" y="50" width="7" height="10" rx="1.5"/><rect x="4" y="86" width="7" height="10" rx="1.5"/><rect x="4" y="122" width="7" height="10" rx="1.5"/><rect x="4" y="158" width="7" height="10" rx="1.5"/><rect x="4" y="176" width="7" height="10" rx="1.5"/>
  <rect x="789" y="14" width="7" height="10" rx="1.5"/><rect x="789" y="50" width="7" height="10" rx="1.5"/><rect x="789" y="86" width="7" height="10" rx="1.5"/><rect x="789" y="122" width="7" height="10" rx="1.5"/><rect x="789" y="158" width="7" height="10" rx="1.5"/><rect x="789" y="176" width="7" height="10" rx="1.5"/>
</g>

<!-- LETTERBOXD label -->
<text x="772" y="188" text-anchor="end" font-family="'Courier New',monospace"
  font-size="7" fill="#161824" letter-spacing="2.5">LETTERBOXD</text>

<!-- outer border -->
<rect width="800" height="200" fill="none" stroke="#1a1c2c" stroke-width="1"/>
</svg>
